services:
  postgres:
    image: postgres:16-alpine
    container_name: scraping-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraping_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis: # ⭐ THÊM CÁI NÀY
    image: redis:7-alpine
    container_name: scraping-platform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"] # tránh mất job

volumes:
  postgres_data:
  redis_data:
